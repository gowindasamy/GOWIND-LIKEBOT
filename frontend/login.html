 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOWIND LIKEBOT - Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">

        <h1>GOWIND LIKEBOT</h1>
        <p>Instagram Likes Panel</p>

        <form>

            <label>Username</label>
            <input
                type="text"
                id="username"
                placeholder="Enter Username"
                required
            >

            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
