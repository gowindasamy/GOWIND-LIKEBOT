<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order - GOWIND LIKEBOT</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="order-box">

        <h1>New Order</h1>

        <form>

            <label>Instagram Post URL</label>
            <input
                type="url"
                id="postUrl"
                placeholder="https://instagram.com/p/..."
                required
            >

            <label>Quantity</label>
            <input
                type="number"
                id="quantity"
                placeholder="Enter Likes"
                min="1"
                required
            >

            <label>Price</label>
            <input
                type="text"
                id="price"
                value="₹0.00"
                readonly
            >

            <button type="submit">
                Place Order
            </button>

            <button
                type="button"
                onclick="location.href='dashboard.html'">
                Back
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
